<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Calculator App</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --border: #dcdde1;
            --bg: #f5f6fa;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0; padding: 20px;
        }

        .app-container { max-width: 800px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 30px; }

        .tab-nav { display: flex; gap: 5px; }
        .tab-link {
            flex: 1; padding: 12px; border: 1px solid var(--border);
            background: #e1e2e6; cursor: pointer; border-radius: 8px 8px 0 0;
            font-size: 1rem;
        }
        .tab-link.active { background: var(--white); border-bottom: none; font-weight: bold; }

        .calculator-card {
            background: var(--white); padding: 30px; border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: #7f8c8d; }
        input {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 4px; font-family: monospace; font-size: 1rem; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; background: var(--primary); color: white;
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        button:hover { filter: brightness(1.2); }
        button.secondary { background: var(--accent); }
        .button-row { display: flex; gap: 10px; margin-top: 10px; }

        .result-summary {
            margin: 20px 0; padding: 20px; background: #f8f9fa;
            border-left: 5px solid var(--primary); font-family: monospace; font-size: 1.1rem;
        }

        .table-container { max-height: 400px; overflow-y: auto; margin-top: 20px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-family: monospace; font-size: 0.85rem; }
        th { background: #f8f9fa; position: sticky; top: 0; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        .audit-trail { margin-top: 30px; background: #34495e; color: #ecf0f1; padding: 20px; border-radius: 8px; }
        .trail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #history-list { list-style: none; padding: 0; font-family: monospace; font-size: 0.8rem; line-height: 1.6; }
        #btn-clear-history { width: auto; padding: 5px 10px; background: #e74c3c; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Accounting Calculator App</h1>
            <p>Professional Financial Tool Suite</p>
        </header>

        <nav class="tab-nav">
            <button class="tab-link active" onclick="openTab(event, 'loan-tab')">Loan Amortisation</button>
            <button class="tab-link" onclick="openTab(event, 'tax-tab')">VAT & Margins</button>
        </nav>

        <main class="calculator-card">
            <section id="loan-tab" class="tab-content active">
                <h2>Loan Amortisation</h2>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Principal (£)</label>
                        <input type="number" id="loan-principal" value="10000">
                    </div>
                    <div class="input-group">
                        <label>Annual Interest (%)</label>
                        <input type="number" id="loan-interest" value="5" step="0.1">
                    </div>
                    <div class="input-group">
                        <label>Term (Years)</label>
                        <input type="number" id="loan-years" value="5">
                    </div>
                </div>
                <button id="btn-loan">Generate Schedule</button>
                
                <div class="result-summary" id="loan-result">Monthly Payment: --</div>
                
                <div class="table-container">
                    <table id="amortization-table">
                        <thead>
                            <tr>
                                <th>Month</th>
                                <th>Interest</th>
                                <th>Principal</th>
                                <th>Balance</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>

            <section id="tax-tab" class="tab-content">
                <h2>VAT & Profit Margins</h2>
                <div class="input-group">
                    <label>Amount / Cost (£)</label>
                    <input type="number" id="calc-amount" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>Rate / Revenue (£)</label>
                    <input type="number" id="calc-secondary" placeholder="20% or Sales Price">
                </div>
                <div class="button-row">
                    <button id="btn-vat-add">Add VAT</button>
                    <button id="btn-margin" class="secondary">Calculate Margin</button>
                </div>
                <div class="result-summary" id="tax-result">Result: --</div>
            </section>
        </main>

        <aside class="audit-trail">
            <div class="trail-header">
                <h3>Digital Tape (Audit History)</h3>
                <button id="btn-clear-history">Clear History</button>
            </div>
            <ul id="history-list"></ul>
        </aside>
    </div>

    <script>
        // --- Tab Switching Logic ---
        function openTab(evt, tabName) {
            const contents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < contents.length; i++) {
                contents[i].classList.remove("active");
            }
            const links = document.getElementsByClassName("tab-link");
            for (let i = 0; i < links.length; i++) {
                links[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- Core Finance Logic ---
        const FinanceLogic = {
            addVAT: (amount, rate) => {
                const tax = amount * (rate / 100);
                return { tax: tax.toFixed(2), total: (amount + tax).toFixed(2) };
            },
            getMarginMarkup: (cost, revenue) => {
                const profit = revenue - cost;
                const margin = (profit / revenue) * 100;
                const markup = (profit / cost) * 100;
                return {
                    profit: profit.toFixed(2),
                    margin: margin.toFixed(2),
                    markup: markup.toFixed(2)
                };
            },
            generateAmortization: (principal, annualRate, years) => {
                const monthlyRate = (annualRate / 100) / 12;
                const totalMonths = years * 12;
                const monthlyPayment = (principal * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -totalMonths));
                let balance = principal;
                const schedule = [];
                for (let i = 1; i <= totalMonths; i++) {
                    const interestPayment = balance * monthlyRate;
                    const principalPayment = monthlyPayment - interestPayment;
                    balance -= principalPayment;
                    schedule.push({
                        month: i,
                        interest: interestPayment.toFixed(2),
                        principal: principalPayment.toFixed(2),
                        balance: Math.max(0, balance).toFixed(2)
                    });
                }
                return { monthlyPayment: monthlyPayment.toFixed(2), schedule };
            }
        };

        // --- UI Logic & Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            const historyList = document.getElementById('history-list');
            
            function logToTape(msg) {
                const li = document.createElement('li');
                li.textContent = `[${new Date().toLocaleTimeString('en-GB')}] ${msg}`;
                if (historyList) historyList.prepend(li);
            }

            // Loan Logic
            document.getElementById('btn-loan').addEventListener('click', () => {
                const p = parseFloat(document.getElementById('loan-principal').value);
                const r = parseFloat(document.getElementById('loan-interest').value);
                const y = parseFloat(document.getElementById('loan-years').value);

                if (isNaN(p) || isNaN(r) || isNaN(y)) return alert("Please enter valid numbers.");

                const result = FinanceLogic.generateAmortization(p, r, y);
                document.getElementById('loan-result').innerHTML = `Monthly Payment: <strong>£${result.monthlyPayment}</strong>`;
                
                const tbody = document.querySelector('#amortization-table tbody');
                tbody.innerHTML = ''; 
                result.schedule.forEach(row => {
                    const tr = `<tr>
                        <td>${row.month}</td>
                        <td>£${row.interest}</td>
                        <td>£${row.principal}</td>
                        <td>£${row.balance}</td>
                    </tr>`;
                    tbody.insertAdjacentHTML('beforeend', tr);
                });
                logToTape(`Loan: £${p} at ${r}% for ${y}y. Payment: £${result.monthlyPayment}`);
            });

            // VAT Logic
            document.getElementById('btn-vat-add').addEventListener('click', () => {
                const amt = parseFloat(document.getElementById('calc-amount').value);
                const rate = parseFloat(document.getElementById('calc-secondary').value);
                if (isNaN(amt) || isNaN(rate)) return alert("Check amount and rate fields.");

                const res = FinanceLogic.addVAT(amt, rate);
                document.getElementById('tax-result').innerHTML = `Total (Gross): £${res.total} (Tax: £${res.tax})`;
                logToTape(`VAT: £${amt} + ${rate}% = £${res.total}`);
            });

            // Margin Logic
            document.getElementById('btn-margin').addEventListener('click', () => {
                const cost = parseFloat(document.getElementById('calc-amount').value);
                const rev = parseFloat(document.getElementById('calc-secondary').value);
                if (isNaN(cost) || isNaN(rev)) return alert("Check cost and revenue fields.");

                const res = FinanceLogic.getMarginMarkup(cost, rev);
                document.getElementById('tax-result').innerHTML = `Margin: ${res.margin}% | Markup: ${res.markup}%`;
                logToTape(`Margin: Cost £${cost}, Rev £${rev} -> ${res.margin}%`);
            });

            // Clear History
            document.getElementById('btn-clear-history').addEventListener('click', () => {
                historyList.innerHTML = '';
            });
        });
    </script>
</body>
</html>
