<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Calculator App</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --border: #2c3e50;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --tab-inactive: #dcdde1;
            --trail-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --primary: #ecf0f1;
            --accent: #2ecc71;
            --border: #ecf0f1;
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #f5f6fa;
            --tab-inactive: #3d3d3d;
            --trail-bg: #222222;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .app-container { 
            max-width: 1100px; 
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px; /* Sidebar on right */
            gap: 20px;
        }

        header { 
            grid-column: 1 / -1;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
        }

        #theme-toggle {
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 4px;
            border: 2px solid var(--primary);
            background: var(--card-bg);
            color: var(--text);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Tabs Styling */
        .main-content { grid-column: 1; }
        .tab-nav { display: flex; gap: 4px; }
        .tab-link {
            flex: 1; padding: 15px; 
            border: 2px solid var(--border);
            border-bottom: none;
            background: var(--tab-inactive); 
            cursor: pointer; 
            border-radius: 8px 8px 0 0;
            font-size: 0.9rem;
            color: var(--text);
            font-weight: bold;
        }
        .tab-link.active { 
            background: var(--card-bg); 
            border-bottom: 2px solid var(--card-bg);
            color: var(--accent);
            position: relative;
            z-index: 2;
        }

        .calculator-card {
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 0 8px 8px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 2px solid var(--border);
            margin-top: -2px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Input Controls */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--accent); }
        input {
            width: 100%; padding: 10px; border: 2px solid var(--border);
            border-radius: 4px; font-family: 'Courier New', monospace; font-size: 1rem; 
            box-sizing: border-box; background: var(--card-bg); color: var(--text);
        }

        .action-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button {
            flex: 1; padding: 14px; background: var(--primary); color: var(--bg);
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        button.secondary { background: var(--accent); color: white; }
        button.danger { background: #e74c3c; color: white; flex: 0.4; }
        button:hover { opacity: 0.9; }

        /* Results & Tables */
        .result-summary {
            margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.03);
            border-left: 8px solid var(--accent); font-family: monospace; font-size: 1.1rem;
        }

        .table-container { 
            max-height: 500px; 
            overflow-y: auto; 
            border: 2px solid var(--border); 
            border-radius: 4px; 
        }
        table { width: 100%; border-collapse: collapse; font-family: monospace; font-size: 0.85rem; }
        th { background: var(--primary); color: var(--bg); position: sticky; top: 0; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        tr:nth-child(even) { background: rgba(0,0,0,0.03); }

        /* Sidebar Audit Trail */
        .sidebar { grid-column: 2; position: sticky; top: 20px; height: fit-content; }
        .audit-trail { 
            background: var(--trail-bg); 
            border: 2px solid var(--border); 
            padding: 15px; 
            border-radius: 8px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .trail-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; border-bottom: 2px solid var(--accent); padding-bottom: 5px; 
        }
        .trail-header h3 { margin: 0; font-size: 0.9rem; }
        #history-list { list-style: none; padding: 0; font-family: monospace; font-size: 0.75rem; line-height: 1.6; }
        #history-list li { border-bottom: 1px dashed var(--border); padding: 5px 0; }
        #btn-clear-history { padding: 4px 8px; background: #e74c3c; color: white; font-size: 0.65rem; border: none; border-radius: 3px; cursor: pointer; }

        /* Responsive */
        @media (max-width: 850px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { grid-column: 1; position: relative; top: 0; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="app-container">
        <header>
            <div>
                <h1 style="margin:0;">Accounting Calculator App</h1>
                <small>Professional Financial Utilities</small>
            </div>
            <button id="theme-toggle">Switch Theme</button>
        </header>

        <div class="main-content">
            <nav class="tab-nav">
                <button class="tab-link active" onclick="openTab(event, 'loan-tab')">Amortisation</button>
                <button class="tab-link" onclick="openTab(event, 'vat-tab')">VAT</button>
                <button class="tab-link" onclick="openTab(event, 'margin-tab')">Margins</button>
            </nav>

            <main class="calculator-card">
                <section id="loan-tab" class="tab-content active">
                    <h2>Loan Amortisation</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Principal (£)</label>
                            <input type="number" id="loan-principal" value="10000">
                        </div>
                        <div class="input-group">
                            <label>Annual Interest (%)</label>
                            <input type="number" id="loan-interest" value="5.0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Term (Years)</label>
                            <input type="number" id="loan-years" value="5">
                        </div>
                    </div>
                    <div class="action-row">
                        <button id="btn-loan" class="secondary">Calculate Schedule</button>
                        <button id="btn-clear-table" class="danger">Clear Table</button>
                    </div>
                    <div class="result-summary" id="loan-result">Monthly Payment: --</div>
                    <div class="table-container" id="table-box" style="display:none;">
                        <table id="amortization-table">
                            <thead>
                                <tr><th>Month</th><th>Interest</th><th>Principal</th><th>Balance</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>

                <section id="vat-tab" class="tab-content">
                    <h2>VAT Calculator</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Net Amount (£)</label>
                            <input type="number" id="vat-net" placeholder="100.00">
                        </div>
                        <div class="input-group">
                            <label>VAT Rate (%)</label>
                            <input type="number" id="vat-rate" value="20">
                        </div>
                    </div>
                    <button id="btn-vat-add" class="secondary">Add VAT</button>
                    <div class="result-summary" id="vat-result">Gross Total: --</div>
                </section>

                <section id="margin-tab" class="tab-content">
                    <h2>Profitability Analysis</h2>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Cost of Goods (£)</label>
                            <input type="number" id="margin-cost" placeholder="50.00">
                        </div>
                        <div class="input-group">
                            <label>Sales Price (£)</label>
                            <input type="number" id="margin-rev" placeholder="100.00">
                        </div>
                    </div>
                    <button id="btn-margin">Calculate Ratios</button>
                    <div class="result-summary" id="margin-result">Margin: -- | Markup: --</div>
                </section>
            </main>
        </div>

        <div class="sidebar">
            <aside class="audit-trail">
                <div class="trail-header">
                    <h3>Audit Trail</h3>
                    <button id="btn-clear-history">Clear</button>
                </div>
                <ul id="history-list"></ul>
            </aside>
        </div>
    </div>

    <script>
        // --- Theme Logic ---
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        });

        // --- Tab Logic ---
        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- Finance Engine ---
        const Finance = {
            vat: (net, rate) => {
                const tax = net * (rate / 100);
                return { tax: tax.toFixed(2), gross: (net + tax).toFixed(2) };
            },
            profit: (cost, rev) => {
                const p = rev - cost;
                return {
                    margin: ((p / rev) * 100).toFixed(2),
                    markup: ((p / cost) * 100).toFixed(2)
                };
            },
            amortise: (p, r, y) => {
                const mRate = (r / 100) / 12;
                const mTotal = y * 12;
                const pay = (p * mRate) / (1 - Math.pow(1 + mRate, -mTotal));
                let bal = p;
                const sched = [];
                for (let i = 1; i <= mTotal; i++) {
                    const int = bal * mRate;
                    const princ = pay - int;
                    bal -= princ;
                    sched.push({ i, int: int.toFixed(2), princ: princ.toFixed(2), bal: Math.max(0, bal).toFixed(2) });
                }
                return { pay: pay.toFixed(2), sched };
            }
        };

        // --- Event Listeners ---
        document.addEventListener('DOMContentLoaded', () => {
            const historyList = document.getElementById('history-list');
            const log = (msg) => {
                const li = document.createElement('li');
                li.textContent = `[${new Date().toLocaleTimeString('en-GB')}] ${msg}`;
                historyList.prepend(li);
            };

            // Loan
            document.getElementById('btn-loan').addEventListener('click', () => {
                const p = parseFloat(document.getElementById('loan-principal').value);
                const r = parseFloat(document.getElementById('loan-interest').value);
                const y = parseFloat(document.getElementById('loan-years').value);
                if (isNaN(p) || isNaN(r) || isNaN(y)) return;

                const res = Finance.amortise(p, r, y);
                document.getElementById('loan-result').innerHTML = `Monthly Repayment: <strong>£${res.pay}</strong>`;
                document.getElementById('table-box').style.display = 'block';
                const tbody = document.querySelector('#amortization-table tbody');
                tbody.innerHTML = res.sched.map(row => 
                    `<tr><td>${row.i}</td><td>£${row.int}</td><td>£${row.princ}</td><td>£${row.bal}</td></tr>`
                ).join('');
                log(`Loan: £${p} Calc'd`);
            });

            document.getElementById('btn-clear-table').addEventListener('click', () => {
                document.querySelector('#amortization-table tbody').innerHTML = '';
                document.getElementById('table-box').style.display = 'none';
                document.getElementById('loan-result').innerHTML = 'Monthly Payment: --';
            });

            // VAT
            document.getElementById('btn-vat-add').addEventListener('click', () => {
                const net = parseFloat(document.getElementById('vat-net').value);
                const rate = parseFloat(document.getElementById('vat-rate').value);
                if (isNaN(net)) return;
                const res = Finance.vat(net, rate);
                document.getElementById('vat-result').innerHTML = `Gross Total: <strong>£${res.gross}</strong>`;
                log(`VAT: Net £${net} @ ${rate}%`);
            });

            // Margin
            document.getElementById('btn-margin').addEventListener('click', () => {
                const cost = parseFloat(document.getElementById('margin-cost').value);
                const rev = parseFloat(document.getElementById('margin-rev').value);
                if (isNaN(cost) || isNaN(rev)) return;
                const res = Finance.profit(cost, rev);
                document.getElementById('margin-result').innerHTML = `Margin: ${res.margin}% | Markup: ${res.markup}%`;
                log(`Margin: Cost £${cost} / Price £${rev}`);
            });

            document.getElementById('btn-clear-history').addEventListener('click', () => historyList.innerHTML = '');
        });
    </script>
</body>
</html>
