<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Calculator App</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --border: #dcdde1;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --tab-inactive: #e1e2e6;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --primary: #ecf0f1;
            --accent: #2ecc71;
            --border: #444;
            --bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text: #f5f6fa;
            --tab-inactive: #3d3d3d;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 40px 20px;
            transition: all 0.3s ease;
        }

        .app-container { 
            max-width: 1100px; 
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 30px;
        }

        header { 
            grid-column: 1 / -1;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -0.5px; }

        #theme-toggle {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.2s;
        }

        /* Sidebar Audit Trail */
        .sidebar { grid-column: 2; }
        .audit-trail { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 12px;
            position: sticky; top: 40px;
            box-shadow: 0 4px 12px var(--shadow);
        }
        
        .trail-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; 
        }
        
        #history-list { list-style: none; padding: 0; font-family: 'Courier New', monospace; font-size: 0.8rem; }
        #history-list li { padding: 8px 0; border-bottom: 1px solid var(--border); color: var(--text); opacity: 0.8; }

        /* Main Calculator UI */
        .main-content { grid-column: 1; }
        .tab-nav { display: flex; gap: 8px; margin-bottom: -1px; }
        .tab-link {
            padding: 14px 24px; border: 1px solid var(--border);
            background: var(--tab-inactive); cursor: pointer; border-radius: 10px 10px 0 0;
            font-weight: 600; color: var(--text); transition: 0.2s;
        }
        .tab-link.active { 
            background: var(--card-bg); border-bottom: 1px solid var(--card-bg);
            color: var(--accent); box-shadow: 0 -4px 10px var(--shadow);
        }

        .calculator-card {
            background: var(--card-bg); padding: 35px; border-radius: 0 12px 12px 12px;
            box-shadow: 0 10px 30px var(--shadow); border: 1px solid var(--border);
        }

        .tab-content { display: none; transition: opacity 0.3s; }
        .tab-content.active { display: block; }

        /* Inputs & Buttons */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: var(--accent); opacity: 0.9; }
        input {
            width: 100%; padding: 14px; border: 1px solid var(--border);
            border-radius: 8px; font-family: inherit; font-size: 1.1rem; 
            background: var(--bg); color: var(--text); box-sizing: border-box;
        }

        .button-group { display: flex; gap: 12px; }
        button.main-btn {
            flex: 2; padding: 16px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem;
        }
        button.secondary-btn { background: var(--accent); }
        button.clear-btn { flex: 1; background: transparent; border: 1px solid #e74c3c; color: #e74c3c; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Summary & Table */
        .result-summary {
            margin-top: 25px; padding: 20px; background: var(--bg);
            border-radius: 8px; border-left: 6px solid var(--accent); font-size: 1.2rem; font-weight: 500;
        }

        .table-container { margin-top: 25px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: var(--primary); color: white; padding: 14px; text-align: left; }
        td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
        tr:nth-child(even) { background: rgba(0,0,0,0.02); }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { grid-column: 1; margin-top: 20px; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="app-container">
        <header>
            <h1>Accounting Calculator App <span style="font-weight:300; opacity:0.6;">v1.3</span></h1>
            <button id="theme-toggle">Toggle Theme</button>
        </header>

        <div class="main-content">
            <nav class="tab-nav">
                <button class="tab-link active" onclick="openTab(event, 'loan-tab')">Amortisation</button>
                <button class="tab-link" onclick="openTab(event, 'vat-tab')">VAT</button>
                <button class="tab-link" onclick="openTab(event, 'margin-tab')">Margins</button>
            </nav>

            <main class="calculator-card">
                <section id="loan-tab" class="tab-content active">
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Principal Amount (£)</label>
                            <input type="number" id="loan-principal" value="10000">
                        </div>
                        <div class="input-group">
                            <label>Annual Interest Rate (%)</label>
                            <input type="number" id="loan-interest" value="5.0" step="0.1">
                        </div>
                        <div class="input-group">
                            <label>Loan Term (Years)</label>
                            <input type="number" id="loan-years" value="5">
                        </div>
                    </div>
                    <div class="button-group">
                        <button id="btn-loan" class="main-btn secondary-btn">Generate Schedule</button>
                        <button id="btn-clear-table" class="clear-btn">Hide Table</button>
                    </div>
                    <div class="result-summary" id="loan-result">Monthly Payment: --</div>
                    <div class="table-container" id="table-box" style="display:none;">
                        <table>
                            <thead>
                                <tr><th>Month</th><th>Interest</th><th>Principal</th><th>Balance</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>

                <section id="vat-tab" class="tab-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Net Amount (£)</label>
                            <input type="number" id="vat-net" placeholder="e.g. 100.00">
                        </div>
                        <div class="input-group">
                            <label>VAT Rate (%)</label>
                            <input type="number" id="vat-rate" value="20">
                        </div>
                    </div>
                    <button id="btn-vat-add" class="main-btn secondary-btn">Calculate Total Gross</button>
                    <div class="result-summary" id="vat-result">Gross Total: --</div>
                </section>

                <section id="margin-tab" class="tab-content">
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Cost of Goods (£)</label>
                            <input type="number" id="margin-cost" placeholder="e.g. 50.00">
                        </div>
                        <div class="input-group">
                            <label>Sales Revenue (£)</label>
                            <input type="number" id="margin-rev" placeholder="e.g. 100.00">
                        </div>
                    </div>
                    <button id="btn-margin" class="main-btn secondary-btn">Calculate Profitability</button>
                    <div class="result-summary" id="margin-result">Margin: -- | Markup: --</div>
                </section>
            </main>
        </div>

        <div class="sidebar">
            <aside class="audit-trail">
                <div class="trail-header">
                    <h3 style="margin:0; font-size:0.9rem;">Audit Trail</h3>
                    <button id="btn-clear-history" style="font-size:0.7rem; padding:4px 8px; background:none; border:1px solid #e74c3c; color:#e74c3c; border-radius:4px; cursor:pointer;">Clear</button>
                </div>
                <ul id="history-list"></ul>
            </aside>
        </div>
    </div>

    <script>
        // --- Theme ---
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });

        // --- Tabs ---
        function openTab(evt, tabName) {
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-link").forEach(l => l.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // --- Logic ---
        const Finance = {
            vat: (n, r) => ({ tax: (n * (r/100)).toFixed(2), gross: (n * (1 + r/100)).toFixed(2) }),
            profit: (c, r) => ({ m: (((r-c)/r)*100).toFixed(2), u: (((r-c)/c)*100).toFixed(2) }),
            amort: (p, r, y) => {
                const mR = (r/100)/12, mT = y*12;
                const pay = (p * mR) / (1 - Math.pow(1 + mR, -mT));
                let bal = p, sched = [];
                for(let i=1; i<=mT; i++) {
                    const int = bal * mR, princ = pay - int; bal -= princ;
                    sched.push({ i, int: int.toFixed(2), princ: princ.toFixed(2), bal: Math.max(0, bal).toFixed(2) });
                }
                return { pay: pay.toFixed(2), sched };
            }
        };

        // --- Events ---
        document.addEventListener('DOMContentLoaded', () => {
            const history = document.getElementById('history-list');
            const log = (m) => {
                const li = document.createElement('li');
                li.textContent = `[${new Date().toLocaleTimeString('en-GB')}] ${m}`;
                history.prepend(li);
            };

            document.getElementById('btn-loan').addEventListener('click', () => {
                const p = parseFloat(document.getElementById('loan-principal').value);
                const r = parseFloat(document.getElementById('loan-interest').value);
                const y = parseFloat(document.getElementById('loan-years').value);
                if(isNaN(p) || isNaN(r) || isNaN(y)) return;
                const res = Finance.amort(p, r, y);
                document.getElementById('loan-result').innerHTML = `Monthly Repayment: <strong>£${res.pay}</strong>`;
                document.getElementById('table-box').style.display = 'block';
                document.querySelector('#table-box tbody').innerHTML = res.sched.map(row => 
                    `<tr><td>${row.i}</td><td>£${row.int}</td><td>£${row.princ}</td><td>£${row.bal}</td></tr>`).join('');
                log(`Loan: £${p} Amortised`);
            });

            document.getElementById('btn-clear-table').addEventListener('click', () => {
                document.getElementById('table-box').style.display = 'none';
            });

            document.getElementById('btn-vat-add').addEventListener('click', () => {
                const n = parseFloat(document.getElementById('vat-net').value), r = parseFloat(document.getElementById('vat-rate').value);
                if(isNaN(n)) return;
                const res = Finance.vat(n, r);
                document.getElementById('vat-result').innerHTML = `Gross Total: <strong>£${res.gross}</strong>`;
                log(`VAT: £${n} @ ${r}%`);
            });

            document.getElementById('btn-margin').addEventListener('click', () => {
                const c = parseFloat(document.getElementById('margin-cost').value), r = parseFloat(document.getElementById('margin-rev').value);
                if(isNaN(c) || isNaN(r)) return;
                const res = Finance.profit(c, r);
                document.getElementById('margin-result').innerHTML = `Margin: <strong>${res.m}%</strong> | Markup: <strong>${res.u}%</strong>`;
                log(`Profit: Cost £${c} / Sale £${r}`);
            });

            document.getElementById('btn-clear-history').addEventListener('click', () => history.innerHTML = '');
        });
    </script>
</body>
</html>
